services:
  # ─── Application Database ───────────────────────────────────────────
  postgres:
    image: postgres:17
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyhub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-studyhub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyhub} -d ${POSTGRES_DB:-studyhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Knowledge Graph ────────────────────────────────────────────────
  neo4j:
    image: neo4j:2025
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_AUTH_PASSWORD:-neo4j_dev}"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_AUTH_PASSWORD:-neo4j_dev} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Full-Text Search ──────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_key}
    volumes:
      - msdata:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache / Message Broker ─────────────────────────────────────────
  valkey:
    image: valkey/valkey:8.1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Object Storage (S3-compatible) ────────────────────────────────
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.port=8333 -master.port=9333 -volume.port=8080 -filer -filer.port=8888
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - seaweeddata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Temporal Database (separate from app) ─────────────────────────
  temporal-db:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:-temporal_dev}
      POSTGRES_DB: temporal
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_DB_USER:-temporal} -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Workflow Orchestration ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_DB_USER:-temporal}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:-temporal_dev}
      POSTGRES_SEEDS: temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Temporal Web UI ───────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  msdata:
  seaweeddata:
  temporal_pgdata:
