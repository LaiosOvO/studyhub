services:
  postgres:
    image: postgres:17
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub_prod_2026
      POSTGRES_DB: studyhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyhub -d studyhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/neo4j_prod_2026"
      NEO4J_server_memory_heap_initial__size: "192m"
      NEO4J_server_memory_heap_max__size: "384m"
      NEO4J_server_memory_pagecache_size: "64m"
      NEO4J_server_jvm_additional: "-XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
    volumes:
      - neo4jdata:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_prod_2026 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: always
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY: meili_prod_2026_key
      MEILI_ENV: production
    volumes:
      - msdata:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  valkey:
    image: valkey/valkey:8.1
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  temporal-db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal_prod_2026
      POSTGRES_DB: temporal
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  temporal:
    image: temporalio/auto-setup:latest
    restart: always
    ports:
      - "127.0.0.1:7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal_prod_2026
      POSTGRES_SEEDS: temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl cluster health 2>/dev/null || temporal operator cluster health 2>/dev/null || true"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://studyhub:studyhub_prod_2026@postgres:5432/studyhub"
      VALKEY_URL: "valkey://valkey:6379"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4j_prod_2026"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "meili_prod_2026_key"
      TEMPORAL_HOST: "temporal:7233"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      DEFAULT_LLM_MODEL: "openai/MiniMax-M1"
      LLM_FALLBACK_MODEL: "openai/MiniMax-M1"
      CORS_ORIGINS: '["*"]'
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ../frontend/out:/usr/share/nginx/html:ro
      - ../frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/api_proxy.conf:/etc/nginx/api_proxy.conf:ro
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 64M

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    command: ["uv", "run", "python", "-m", "app.worker"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://studyhub:studyhub_prod_2026@postgres:5432/studyhub"
      VALKEY_URL: "valkey://valkey:6379"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4j_prod_2026"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "meili_prod_2026_key"
      TEMPORAL_HOST: "temporal:7233"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      DEFAULT_LLM_MODEL: "openai/MiniMax-M1"
      LLM_FALLBACK_MODEL: "openai/MiniMax-M1"
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  neo4jdata:
  msdata:
  temporal_pgdata:
