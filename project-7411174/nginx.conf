server {
    listen 80;
    server_name _;

    # ── API reverse proxy: /api/* → backend:8000/* ───────────
    # The trailing / on proxy_pass strips the /api prefix
    location /api/ {
        # Strip backend CORS headers (nginx manages CORS)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # CORS headers for cross-origin requests (local dev)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ── Frontend SPA at /studyhub ────────────────────────────
    location /studyhub/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /studyhub/index.html;
    }

    location = /studyhub {
        return 301 /studyhub/;
    }

    # ── Root redirect ────────────────────────────────────────
    location = / {
        return 301 /studyhub/;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Max upload size
    client_max_body_size 50M;
}
